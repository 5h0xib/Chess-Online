<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chess Online – Manage your friends, send and accept friend requests.">
    <title>Friends – Chess Online</title>
    <script>try { document.documentElement.setAttribute('data-theme', localStorage.getItem('chess-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')); } catch (e) { }</script>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/friends.css">
</head>

<body class="friends-page">

    <div class="page-loader" id="pageLoader">
        <div class="stack">
        <div class="stack__card"></div>
        <div class="stack__card"></div>
        <div class="stack__card"></div>
    </div>
    </div>

    <nav class="topnav">
        <a href="/dashboard.html" class="nav-logo">
            <img src="assets/logo.png" alt="Chess Online">
            <span>Chess Online</span>
        </a>
        <button class="nav-hamburger" aria-label="Menu" aria-expanded="false">
            <i class="bi bi-list"></i>
        </button>
        <div class="nav-links">
            <a href="/dashboard.html" class="nav-link"><i class="bi bi-house"></i><span>Dashboard</span></a>
            <a href="/friends.html" class="nav-link active"><i class="bi bi-people"></i><span>Friends</span></a>
            <a href="/history.html" class="nav-link"><i class="bi bi-clock-history"></i><span>History</span></a>
        </div>
        <div class="nav-user">
            <button class="theme-toggle" aria-label="Toggle theme">
                <i class="bi bi-moon-fill icon-moon"></i>
                <i class="bi bi-sun-fill icon-sun"></i>
            </button>
            <div class="avatar avatar-sm" id="navAvatar">?</div>
            <span class="nav-username" id="navUsername"></span>
            <button class="btn btn-ghost btn-sm" onclick="Auth.signOut().then(()=>window.location='/index.html')">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <main class="friends-main">

        <div class="page-heading">
            <h1>Friends</h1>
            <span class="badge badge-blue" id="pendingCount" style="display:none"></span>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-wrap">
                <i class="bi bi-search search-icon"></i>
                <input type="text" class="input" id="searchInput" placeholder="Search users by username…"
                    autocomplete="off">
                <div class="search-results" id="searchResults"></div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="friendsPanel">
                <i class="bi bi-people"></i>
                My Friends
            </button>
            <button class="tab-btn" data-tab="receivedPanel">
                <i class="bi bi-inbox"></i>
                Received
                <span class="tab-count" id="receivedCount" style="display:none">0</span>
            </button>
            <button class="tab-btn" data-tab="sentPanel">
                <i class="bi bi-send"></i>
                Sent
            </button>
        </div>

        <div class="friends-card">
            <div class="tab-panel active" id="friendsPanel">
                <div class="friends-card-body">
                    <div class="friends-list" id="friendsList">
                        <div class="empty-state">
                            <div class="spinner" style="margin:0 auto;width:24px;height:24px;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-panel" id="receivedPanel">
                <div class="friends-card-body">
                    <div class="friends-list" id="receivedList">
                        <div class="empty-state">
                            <div class="spinner" style="margin:0 auto;width:24px;height:24px;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-panel" id="sentPanel">
                <div class="friends-card-body">
                    <div class="friends-list" id="sentList">
                        <div class="empty-state">
                            <div class="spinner" style="margin:0 auto;width:24px;height:24px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/friends.js"></script>
    <script src="js/theme.js"></script>
    <script>
        (async () => {
            const auth = await Auth.requireAuth();
            if (!auth) return;
            document.getElementById('navUsername').textContent = auth.profile.username;
            document.getElementById('navAvatar').textContent = auth.profile.username[0].toUpperCase();
            await FriendsModule.initFriends(auth.user.id);
            const loader = document.getElementById('pageLoader');
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 500);
        })();
    </script>
</body>

</html>
