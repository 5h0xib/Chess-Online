<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chess Online Dashboard â€“ View your stats, friends, and recent games.">
    <title>Dashboard â€“ Chess Online</title>
    <script>try { document.documentElement.setAttribute('data-theme', localStorage.getItem('chess-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')); } catch (e) { }</script>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body class="dashboard-page">

    <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
    </div>

    <nav class="topnav">
        <a href="/Chess-Online/dashboard.html" class="nav-logo">
            <img src="assets/logo.png" alt="Chess Online">
            <span>Chess Online</span>
        </a>
        <button class="nav-hamburger" aria-label="Menu" aria-expanded="false">
            <i class="bi bi-list"></i>
        </button>
        <div class="nav-links">
            <a href="/Chess-Online/dashboard.html" class="nav-link active">
                <i class="bi bi-house"></i><span>Dashboard</span>
            </a>
            <a href="/Chess-Online/friends.html" class="nav-link">
                <i class="bi bi-people"></i><span>Friends</span>
            </a>
            <a href="/Chess-Online/history.html" class="nav-link">
                <i class="bi bi-clock-history"></i><span>History</span>
            </a>
        </div>
        <div class="nav-user">
            <button class="theme-toggle" aria-label="Toggle theme">
                <i class="bi bi-moon-fill icon-moon"></i>
                <i class="bi bi-sun-fill icon-sun"></i>
            </button>
            <div class="avatar avatar-sm" id="navAvatar">?</div>
            <span class="nav-username" id="navUsername"></span>
            <button class="btn btn-ghost btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sign out</span>
            </button>
        </div>
    </nav>

    <main class="dashboard-main">

        <!-- Welcome Banner -->
        <div class="welcome-banner card">
            <div class="welcome-text">
                <h2 id="welcomeName">Welcome back!</h2>
                <p>Ready for your next match? Challenge a friend or train against the AI.</p>
            </div>
            <div class="welcome-actions">
                <button class="btn btn-primary" id="btnPlayComputer">
                    <i class="bi bi-cpu"></i> vs Computer
                </button>
                <button class="btn btn-secondary" id="btnChallengeFriend">
                    <i class="bi bi-lightning-charge-fill"></i> Challenge Friend
                </button>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card card">
                <div class="stat-value" id="statWins">â€”</div>
                <div class="stat-label">Wins</div>
            </div>
            <div class="stat-card card">
                <div class="stat-value" id="statLosses">â€”</div>
                <div class="stat-label">Losses</div>
            </div>
            <div class="stat-card card">
                <div class="stat-value" id="statDraws">â€”</div>
                <div class="stat-label">Draws</div>
            </div>
            <div class="stat-card card">
                <div class="stat-value" id="statFriends">â€”</div>
                <div class="stat-label">Friends</div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Left -->
            <div style="display:flex;flex-direction:column;gap:16px;">
                <!-- Quick Play -->
                <div class="section-card card">
                    <div class="section-header">
                        <div class="section-title"><i class="bi bi-lightning-charge-fill"></i>Quick Play</div>
                    </div>
                    <div class="play-options">
                        <button class="play-option" onclick="document.getElementById('btnPlayComputer').click()">
                            <div class="po-icon"><i class="bi bi-cpu"></i></div>
                            <div class="po-text">
                                <h4>vs Computer</h4>
                                <p>Practice against AI Â· Easy / Medium / Hard</p>
                            </div>
                        </button>
                        <button class="play-option" onclick="window.location='/Chess-Online/friends.html'">
                            <div class="po-icon"><i class="bi bi-lightning-charge-fill"></i></div>
                            <div class="po-text">
                                <h4>Challenge a Friend</h4>
                                <p>Send a chess challenge to any friend</p>
                            </div>
                        </button>
                        <button class="play-option" onclick="window.location='/Chess-Online/history.html'">
                            <div class="po-icon"><i class="bi bi-clock-history"></i></div>
                            <div class="po-text">
                                <h4>Game History</h4>
                                <p>Review your past games</p>
                            </div>
                        </button>
                    </div>
                </div>
                <!-- Recent Games -->
                <div class="section-card card">
                    <div class="section-header">
                        <div class="section-title"><i class="bi bi-controller"></i>Recent Games</div>
                        <a href="/Chess-Online/history.html" class="btn btn-ghost btn-sm">View all</a>
                    </div>
                    <div id="recentGames">
                        <div class="empty-state">
                            <div class="spinner" style="margin:0 auto;width:24px;height:24px;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Friends -->
            <div class="section-card card">
                <div class="section-header">
                    <div class="section-title"><i class="bi bi-people"></i>Friends</div>
                    <a href="/Chess-Online/friends.html" class="btn btn-ghost btn-sm">Manage</a>
                </div>
                <div id="friendsSidebar">
                    <div class="empty-state">
                        <div class="spinner" style="margin:0 auto;width:24px;height:24px;"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/theme.js"></script>
    <script>DashboardModule.initDashboard();</script>
</body>

</html>
