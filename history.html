<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chess Online – View your game history and past matches.">
    <title>History – Chess Online</title>
    <script>try { document.documentElement.setAttribute('data-theme', localStorage.getItem('chess-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')); } catch (e) { }</script>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/history.css">
</head>

<body class="history-page">

    <div class="page-loader" id="pageLoader">
        <svg class="pl" viewBox="0 0 128 128" width="128px" height="128px" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="pl-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="hsl(193,90%,55%)" />
                    <stop offset="100%" stop-color="hsl(223,90%,55%)" />
                </linearGradient>
            </defs>
            <circle class="pl__ring" r="56" cx="64" cy="64" fill="none" stroke="hsla(0,10%,10%,0.1)" stroke-width="16"
                stroke-linecap="round" />
            <path class="pl__worm"
                d="M92,15.492S78.194,4.967,66.743,16.887c-17.231,17.938-28.26,96.974-28.26,96.974L119.85,59.892l-99-31.588,57.528,89.832L97.8,19.349,13.636,88.51l89.012,16.015S81.908,38.332,66.1,22.337C50.114,6.156,36,15.492,36,15.492a56,56,0,1,0,56,0Z"
                fill="none" stroke="url(#pl-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"
                stroke-dasharray="44 1111" stroke-dashoffset="10" />
        </svg>
    </div>

    <nav class="topnav">
        <a href="/dashboard.html" class="nav-logo">
            <img src="assets/logo.png" alt="Chess Online">
            <span>Chess Online</span>
        </a>
        <button class="nav-hamburger" aria-label="Menu"><i class="bi bi-list"></i></button>
        <div class="nav-links">
            <a href="/dashboard.html" class="nav-link"><i class="bi bi-house"></i><span>Dashboard</span></a>
            <a href="/friends.html" class="nav-link"><i class="bi bi-people"></i><span>Friends</span></a>
            <a href="/history.html" class="nav-link active"><i class="bi bi-clock-history"></i><span>History</span></a>
        </div>
        <div class="nav-user">
            <button class="theme-toggle" aria-label="Toggle theme">
                <i class="bi bi-moon-fill icon-moon"></i>
                <i class="bi bi-sun-fill icon-sun"></i>
            </button>
            <div class="avatar avatar-sm" id="navAvatar">?</div>
            <span class="nav-username" id="navUsername"></span>
            <button class="btn btn-ghost btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <main class="history-main">

        <div class="page-heading">
            <h1>Game History</h1>
            <a href="/dashboard.html" class="btn btn-ghost btn-sm">
                <i class="bi bi-arrow-left"></i> Dashboard
            </a>
        </div>

        <!-- Summary Stats -->
        <div class="stats-row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;">
            <div class="stat-card card">
                <div class="stat-value" id="totalGames">—</div>
                <div class="stat-label">Total Games</div>
            </div>
            <div class="stat-card card">
                <div class="stat-value" id="totalWins" style="color:var(--success-fg)">—</div>
                <div class="stat-label">Wins</div>
            </div>
            <div class="stat-card card">
                <div class="stat-value" id="totalLosses" style="color:var(--danger-fg)">—</div>
                <div class="stat-label">Losses</div>
            </div>
            <div class="stat-card card">
                <div class="stat-value" id="totalDraws" style="color:var(--fg-muted)">—</div>
                <div class="stat-label">Draws</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All Games</button>
            <button class="filter-btn" data-filter="win">Wins</button>
            <button class="filter-btn" data-filter="loss">Losses</button>
            <button class="filter-btn" data-filter="draw">Draws</button>
        </div>

        <!-- Table -->
        <div class="history-table-wrap">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Opponent</th>
                        <th>Color</th>
                        <th>Result</th>
                        <th>Moves</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="historyTbody">
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="spinner" style="margin:0 auto;width:24px;height:24px;"></div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/history.js"></script>
    <script src="js/theme.js"></script>
    <script>HistoryModule.initHistory();</script>
</body>

</html>
